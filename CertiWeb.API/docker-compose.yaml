services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword   # Contraseña del root
      MYSQL_DATABASE: certiweb
      MYSQL_USER: certiweb_user
      MYSQL_PASSWORD: certiweb_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - certiweb-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - certiweb-network

  api:
    image: "certiweb-api:local"
    ports:
      - "3000:8080"
    depends_on:
      - postgres
      - rabbitmq
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;User Id=postgres;Password=postgres;Database=certiweb
      - RabbitMQ__Host=rabbitmq
      mysql:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=certiweb;Uid=certiweb_user;Pwd=certiweb_password;
    networks:
      - certiweb-network

  api2:
    image: "certiweb-api:local"
    ports:
      - "3001:8080"
    depends_on:
      - postgres
      - rabbitmq
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;User Id=postgres;Password=postgres;Database=certiweb
      - RabbitMQ__Host=rabbitmq
      mysql:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=certiweb;Uid=certiweb_user;Pwd=certiweb_password;
    networks:
      - certiweb-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - api2
    networks:
      - certiweb-network

