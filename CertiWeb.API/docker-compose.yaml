#    image: "svennn/certiweb-frontend:latest"
#    ports:
#      - "5173:80"
#    depends_on:
#      - nginx
#    environment:
#      - VITE_SERVER_BASE_PATH=http://nginx:80/api/v1
#    networks:
#      - certiweb-network

volumes:
  mysql_data:

networks:
  certiweb-network:
    driver: bridge